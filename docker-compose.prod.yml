services:
  app:
    build:
      context: app
      dockerfile: dockerfile
    volumes:
      - ./app/dist:/var/app/dist
    env_file:
      - .env.prod

  api:
    build:
      context: api
      dockerfile: dockerfile
    restart: unless-stopped
    volumes:
      - ./geoserver.d/data:/var/app/geoserver_data
    ports:
      - 8080:8080
    env_file:
      .env.prod
    depends_on:
      - redis
      - geoserver

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped

  geoserver:
    image: docker.osgeo.org/geoserver:2.27.x
    container_name: geoserver
    restart: unless-stopped
    volumes:
      - ./geoserver.d/data:/opt/geoserver_data/data
      - ./geoserver.d/workspaces/RF-SITE-PLANNER:/opt/geoserver_data/workspaces/RF-SITE-PLANNER
    env_file:
      .env.prod
    ports:
      - 8081:8080

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./app/dist:/var/www/html
    ports:
      - 80:80
    depends_on:
      app:
        condition: service_completed_successfully
      api:
        condition: service_started
      geoserver:
        condition: service_started

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    hostname: rf-planner
    environment:
      TZ: "Europe/Ljubljana"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_REMOVE_VOLUMES: "true"
      WATCHTOWER_LOG_FORMAT: "Pretty"
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
      WATCHTOWER_SCHEDULE: "* * 6 * * *"
      WATCHTOWER_NOTIFICATIONS: "slack"
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: "${WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
